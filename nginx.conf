# Lectern AI landing page nginx config
# Loaded into /etc/nginx/conf.d/default.conf by docker-compose.

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets — Cloudflare's CDN will also compress, but compressing
  # at origin saves tunnel bandwidth.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             image/svg+xml font/woff font/woff2 application/xml;
  gzip_min_length 512;

  # Security headers. Cloudflare adds a few of these automatically; these
  # are the ones not in the default Cloudflare Security Level.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Long-cache immutable assets in /assets/, short-cache HTML.
  location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
  location ~* \.(html|htm)$ {
    expires 10m;
    add_header Cache-Control "public, max-age=600";
  }

  # Serve .html without the extension: /privacy → /privacy.html
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Kill common probe requests so they don't appear in nginx error logs.
  location = /favicon.ico  { log_not_found off; access_log off; }
  location = /robots.txt   { log_not_found off; access_log off; }
  location ~ /\.           { deny all; access_log off; log_not_found off; }
}
